<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成員介紹 - 生物資訊演算與控制實驗室</title>

    <style>
        /* =========================================
           基礎設定
           ========================================= */
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px 0;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #00eaff;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #333;
            color: gray;
            margin-top: 20px;
        }

        /* 標題區塊 */
        .page-title {
            text-align: center;
            padding: 40px 20px 10px;
        }

        .page-title h2 {
            color: #0056b3;
            border-bottom: 3px solid #0056b3;
            display: inline-block;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        /* =========================================
           成員區塊樣式
           ========================================= */
        .group-container {
            width: 85%;
            max-width: 1200px;
            margin: 0 auto 40px auto;
            background-color: white;
            padding: 30px;
            box-sizing: border-box;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .group-title {
            font-size: 1.5em;
            color: #333;
            border-left: 5px solid #0056b3;
            padding-left: 15px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .member-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: flex-start;
        }

        .member-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 150px;
            text-align: center;
        }

        .member-photo {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #f0f0f0;
            box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease, border-color 0.3s ease;
            margin-bottom: 10px;
            background-color: #fff;
        }

        .member-card:hover .member-photo {
            transform: scale(1.05);
            border-color: #0056b3;
        }

        .member-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #444;
            margin-bottom: 5px;
            overflow-wrap: anywhere;
        }

        .status-message {
            text-align: center;
            color: #666;
            margin: 50px 20px;
        }

        .status-message.error {
            color: #c62828;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.6em;
            }

            header h3 {
                font-size: 1em;
            }

            nav a {
                margin: 0 8px;
                font-size: 0.9em;
            }

            .group-container {
                width: 92%;
                padding: 22px 16px;
            }

            .member-grid {
                justify-content: center;
                gap: 30px;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>生物資訊演算與控制實驗室</h1>
        <h3>Bioinformatic Computing &amp; Control Lab</h3>

        <nav aria-label="主要導覽列">
            <a href="index.html">首頁 (Home)</a>
            <a href="professor.html">指導教授 (Professor)</a>
            <a href="research.html">研究領域 (Research)</a>
            <a href="members.html" style="color: #ff9900;" aria-current="page">成員介紹 (Members)</a>
            <a href="publications.html">發表著作 (Publications)</a>
        </nav>
    </header>

    <main>
        <div class="page-title">
            <h2>實驗室成員 (Lab Members)</h2>
        </div>

        <div id="members-main-container" aria-live="polite">
            <h3 class="status-message">⏳ 正在從雲端載入成員資料中...</h3>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Intelligent Control Lab. All rights reserved.</p>
        <p>地址：國立中興大學電機資訊學院 606 實驗室</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import {
            getFirestore,
            collection,
            getDocs,
            query,
            orderBy
        } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDSsNfKu-G2GJkIzd4_zM0wm49UgJ7_xm0",
            authDomain: "nchu606lab.firebaseapp.com",
            projectId: "nchu606lab",
            storageBucket: "nchu606lab.firebasestorage.app",
            messagingSenderId: "174937158180",
            appId: "1:174937158180:web:90ac6670124fe33f191eb1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 建議將預設圖片放進自己的網站，例如 members/default-user.png。
        // 目前先沿用原本的外部預設圖片。
        const DEFAULT_PHOTO_URL =
            "https://cdn-icons-png.flaticon.com/512/149/149071.png";

        /**
         * 將不確定型別的 Firestore 欄位轉成安全字串。
         * @param {unknown} value
         * @returns {string}
         */
        function toSafeText(value) {
            if (typeof value === "string") {
                return value.trim();
            }

            if (typeof value === "number" && Number.isFinite(value)) {
                return String(value);
            }

            return "";
        }

        /**
         * 只允許網站內部 members 資料夾的相對圖片路徑。
         * 範例：members/student1.jpg
         *
         * @param {unknown} photoUrl
         * @returns {string}
         */
        function getSafeMemberPhoto(photoUrl) {
            const value = toSafeText(photoUrl);

            if (!value) {
                return DEFAULT_PHOTO_URL;
            }

            // 禁止反斜線、上層目錄與特殊 URL，僅接受 members/ 下的相對路徑。
            const isSafeRelativePath =
                /^members\/[A-Za-z0-9._/-]+$/.test(value) &&
                !value.includes("..") &&
                !value.includes("//") &&
                !value.includes("\\");

            return isSafeRelativePath ? value : DEFAULT_PHOTO_URL;
        }

        /**
         * 建立狀態訊息。
         * @param {string} message
         * @param {boolean} isError
         * @returns {HTMLElement}
         */
        function createStatusMessage(message, isError = false) {
            const heading = document.createElement("h3");
            heading.className = isError
                ? "status-message error"
                : "status-message";
            heading.textContent = message;
            return heading;
        }

        /**
         * 建立單一成員卡片。
         * 使用 textContent 與 DOM API，避免 Firestore 內容被當成 HTML 執行。
         *
         * @param {{name?: unknown, photoUrl?: unknown}} member
         * @returns {HTMLElement}
         */
        function createMemberCard(member) {
            const memberNameText = toSafeText(member.name) || "未命名成員";

            const card = document.createElement("div");
            card.className = "member-card";

            const image = document.createElement("img");
            image.className = "member-photo";
            image.src = getSafeMemberPhoto(member.photoUrl);
            image.alt = `${memberNameText}的照片`;
            image.loading = "lazy";
            image.decoding = "async";

            // 圖片不存在或載入失敗時，顯示預設圖片。
            image.addEventListener(
                "error",
                () => {
                    image.src = DEFAULT_PHOTO_URL;
                },
                { once: true }
            );

            const name = document.createElement("div");
            name.className = "member-name";
            name.textContent = memberNameText;

            card.append(image, name);
            return card;
        }

        /**
         * 建立一個成員群組。
         *
         * @param {string} groupName
         * @param {Array<object>} members
         * @returns {HTMLElement}
         */
        function createMemberGroup(groupName, members) {
            const section = document.createElement("section");
            section.className = "group-container";

            const title = document.createElement("div");
            title.className = "group-title";
            title.textContent = groupName;

            const grid = document.createElement("div");
            grid.className = "member-grid";

            members.forEach((member) => {
                grid.appendChild(createMemberCard(member));
            });

            section.append(title, grid);
            return section;
        }

        /**
         * 將成員依照「年份 + 職稱」分組。
         *
         * @param {Array<object>} members
         * @returns {Map<string, Array<object>>}
         */
        function groupMembers(members) {
            const groups = new Map();

            members.forEach((member) => {
                const year = toSafeText(member.year) || "未設定年份";
                const title = toSafeText(member.title) || "未設定身分";
                const groupName = `${year}學年度 ${title}`;

                if (!groups.has(groupName)) {
                    groups.set(groupName, []);
                }

                groups.get(groupName).push(member);
            });

            return groups;
        }

        /**
         * 從 Firebase 讀取並顯示成員資料。
         */
        async function loadMembersFromCloud() {
            const mainContainer = document.getElementById(
                "members-main-container"
            );

            try {
                const membersQuery = query(
                    collection(db, "members"),
                    orderBy("year", "desc")
                );

                const querySnapshot = await getDocs(membersQuery);

                if (querySnapshot.empty) {
                    mainContainer.replaceChildren(
                        createStatusMessage(
                            "目前還沒有建立成員資料，請至後台新增。"
                        )
                    );
                    return;
                }

                const members = [];

                querySnapshot.forEach((documentSnapshot) => {
                    members.push(documentSnapshot.data());
                });

                const groups = groupMembers(members);

                // 年份較新的群組排在前面；同年度則依文字排序。
                const sortedGroupNames = Array.from(groups.keys()).sort(
                    (groupA, groupB) =>
                        groupB.localeCompare(groupA, "zh-Hant", {
                            numeric: true,
                            sensitivity: "base"
                        })
                );

                const fragment = document.createDocumentFragment();

                sortedGroupNames.forEach((groupName) => {
                    const groupMemberList = groups.get(groupName) ?? [];
                    fragment.appendChild(
                        createMemberGroup(groupName, groupMemberList)
                    );
                });

                mainContainer.replaceChildren(fragment);
            } catch (error) {
                console.error("載入成員失敗：", error);

                mainContainer.replaceChildren(
                    createStatusMessage(
                        "❌ 成員資料載入失敗，請稍後再試或聯絡網站管理員。",
                        true
                    )
                );
            }
        }

        loadMembersFromCloud();
    </script>
</body>
</html>
