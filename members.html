<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>成員介紹 - 生物資訊演算與控制實驗室</title>
    
    <style>
        /* =========================================
           基礎設定 (維持一致風格)
           ========================================= */
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; color: #333; }
        header { background-color: #333; color: white; padding: 15px; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; transition: color 0.3s;}
        nav a:hover { color: #00eaff; }
        footer { text-align: center; padding: 20px; background-color: #333; color: gray; margin-top: 20px; }

        /* 標題區塊 */
        .page-title {
            text-align: center;
            padding: 40px 20px 10px;
        }
        .page-title h2 {
            color: #0056b3;
            border-bottom: 3px solid #0056b3;
            display: inline-block;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        /* =========================================
           成員區塊樣式
           ========================================= */
        .group-container {
            width: 85%;
            max-width: 1200px;
            margin: 0 auto 40px auto; 
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        /* 分組標題 */
        .group-title {
            font-size: 1.5em;
            color: #333;
            border-left: 5px solid #0056b3; 
            padding-left: 15px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        /* 成員列表網格 */
        .member-grid {
            display: flex;
            flex-wrap: wrap;       
            gap: 40px;             
            justify-content: flex-start; 
        }

        /* 單個成員卡片 */
        .member-card {
            display: flex;
            flex-direction: column;
            align-items: center;   
            width: 150px;          
            text-align: center;
        }

        /* 成員照片 (圓形) */
        .member-photo {
            width: 140px;
            height: 140px;
            object-fit: cover;     
            border-radius: 50%;    
            border: 4px solid #f0f0f0;
            box-shadow: 3px 3px 8px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
            margin-bottom: 10px;
            background-color: #fff; /* 預防透明背景圖片 */
        }

        .member-card:hover .member-photo {
            transform: scale(1.05);
            border-color: #0056b3;
        }

        /* 成員名字 */
        .member-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #444;
            margin-bottom: 5px;
        }
        
        .member-info {
            font-size: 0.9em;
            color: #777;
        }

        /* 手機版調整 */
        @media (max-width: 600px) {
            .member-grid {
                justify-content: center; 
                gap: 30px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>生物資訊演算與控制實驗室</h1>
        <h3>Bioinformatic Computing & Control Lab</h3>
        <nav>
            <a href="index.html">首頁 (Home)</a>
            <a href="professor.html">指導教授 (Professor)</a>
            <a href="research.html">研究領域 (Research)</a>
            <a href="members.html" style="color: #ff9900;">成員介紹 (Members)</a>
            <a href="publications.html">發表著作 (Publications)</a>
        </nav>
    </header>

    <div class="page-title">
        <h2>實驗室成員 (Lab Members)</h2>
    </div>

    <div id="members-main-container">
        <h3 style="text-align: center; color: #666; margin-top: 50px;">⏳ 正在從雲端載入成員資料中...</h3>
    </div>

    <footer>
        <p>&copy; 2026 Intelligent Control Lab. All rights reserved.</p>
        <p>地址：國立中興大學電機資訊學院 606 實驗室</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import {
            getFirestore,
            collection,
            getDocs,
            query,
            orderBy
        } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDSsNfKu-G2GJkIzd4_zM0wm49UgJ7_xm0",
            authDomain: "nchu606lab.firebaseapp.com",
            projectId: "nchu606lab",
            storageBucket: "nchu606lab.firebasestorage.app",
            messagingSenderId: "174937158180",
            appId: "1:174937158180:web:90ac6670124fe33f191eb1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const DEFAULT_PHOTO =
            "https://cdn-icons-png.flaticon.com/512/149/149071.png";

        function showMessage(container, message, color = "#666") {
            const heading = document.createElement("h3");
            heading.style.textAlign = "center";
            heading.style.color = color;
            heading.style.marginTop = "50px";
            heading.textContent = message;
            container.replaceChildren(heading);
        }

        function createMemberCard(member) {
            const card = document.createElement("div");
            card.className = "member-card";

            const image = document.createElement("img");
            image.className = "member-photo";
            image.alt = String(member.name ?? "成員照片");

            // 保留原本 Firestore photoUrl 的使用方式。
            // 例如：members/student1.jpg，圖片實際存放於 GitHub Pages 專案內。
            const photoUrl = String(member.photoUrl ?? "").trim();
            image.src = photoUrl || DEFAULT_PHOTO;

            image.addEventListener("error", () => {
                if (image.src !== DEFAULT_PHOTO) {
                    image.src = DEFAULT_PHOTO;
                }
            }, { once: true });

            const name = document.createElement("div");
            name.className = "member-name";
            name.textContent = String(member.name ?? "");

            card.append(image, name);
            return card;
        }

        async function loadMembersFromCloud() {
            const mainContainer = document.getElementById("members-main-container");

            try {
                const membersQuery = query(
                    collection(db, "members"),
                    orderBy("year", "desc")
                );
                const querySnapshot = await getDocs(membersQuery);

                if (querySnapshot.empty) {
                    showMessage(
                        mainContainer,
                        "目前還沒有建立成員資料喔！請至後台新增。"
                    );
                    return;
                }

                const groups = new Map();

                querySnapshot.forEach((documentSnapshot) => {
                    const data = documentSnapshot.data();
                    const year = String(data.year ?? "");
                    const title = String(data.title ?? "");
                    const groupName = `${year}學年度 ${title}`;

                    if (!groups.has(groupName)) {
                        groups.set(groupName, []);
                    }

                    groups.get(groupName).push(data);
                });

                const sortedGroupNames = [...groups.keys()].sort(
                    (a, b) => b.localeCompare(a, "zh-Hant", {
                        numeric: true,
                        sensitivity: "base"
                    })
                );

                const pageFragment = document.createDocumentFragment();

                sortedGroupNames.forEach((groupName) => {
                    const groupContainer = document.createElement("section");
                    groupContainer.className = "group-container";

                    const groupTitle = document.createElement("div");
                    groupTitle.className = "group-title";
                    groupTitle.textContent = groupName;

                    const memberGrid = document.createElement("div");
                    memberGrid.className = "member-grid";

                    groups.get(groupName).forEach((member) => {
                        memberGrid.appendChild(createMemberCard(member));
                    });

                    groupContainer.append(groupTitle, memberGrid);
                    pageFragment.appendChild(groupContainer);
                });

                mainContainer.replaceChildren(pageFragment);
            } catch (error) {
                console.error("載入成員失敗:", error);
                showMessage(
                    mainContainer,
                    "❌ 載入失敗，請檢查網路連線或資料庫權限。",
                    "red"
                );
            }
        }

        loadMembersFromCloud();
    </script>
</body>
</html>
