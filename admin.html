<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員登入－生物資訊演算與控制實驗室</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
            box-sizing: border-box;
            background: #f4f4f4;
            color: #333;
        }
        .login-card {
            width: min(460px, 100%);
            box-sizing: border-box;
            padding: 36px;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,.14);
        }
        h1 {
            margin: 0 0 8px;
            color: #0056b3;
            text-align: center;
            font-size: 1.8rem;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin: 0 0 28px;
        }
        .form-group { margin-bottom: 16px; }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            border: 1px solid #bbb;
            border-radius: 7px;
            font: inherit;
        }
        button, .back-link {
            width: 100%;
            box-sizing: border-box;
            display: block;
            padding: 12px 16px;
            border: 0;
            border-radius: 7px;
            font: inherit;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
        }
        .primary {
            margin-top: 8px;
            background: #0056b3;
            color: #fff;
        }
        .secondary {
            margin-top: 10px;
            background: #e9edf2;
            color: #222;
        }
        .danger {
            margin-top: 10px;
            background: #b00020;
            color: #fff;
        }
        button:disabled { opacity: .65; cursor: wait; }
        #login-status {
            min-height: 24px;
            margin-top: 16px;
            text-align: center;
            font-weight: 700;
        }
        #login-status.info { color: #0056b3; }
        #login-status.success { color: #1b7f3a; }
        #login-status.error { color: #b00020; }
        .user-box {
            padding: 14px;
            background: #eef5ff;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 18px;
        }
        [hidden] { display: none !important; }
    </style>
</head>
<body>
    <main class="login-card">
        <h1>管理員登入</h1>
        <p class="subtitle">登入後會回到原頁面並開啟管理模式。</p>

        <section id="login-section">
            <form id="login-form">
                <div class="form-group">
                    <label for="emailInput">管理員 Email</label>
                    <input id="emailInput" type="email" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="passwordInput">密碼</label>
                    <input id="passwordInput" type="password" autocomplete="current-password" required>
                </div>
                <button class="primary" type="submit">登入並進入管理模式</button>
            </form>
        </section>

        <section id="logged-in-section" hidden>
            <div class="user-box">
                已登入：<strong id="current-user-email"></strong>
            </div>
            <button id="continue-btn" class="primary" type="button">回到網站並開啟管理模式</button>
            <button id="logout-btn" class="danger" type="button">登出</button>
        </section>

        <div id="login-status" role="status" aria-live="polite"></div>
        <a id="back-link" class="back-link secondary" href="index.html">返回網站</a>
    </main>

    <script type="module" src="js/admin-login.js"></script>
</body>
</html>
