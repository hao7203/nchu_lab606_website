<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實驗室網站 - 後台管理系統</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 30px;
            margin: 0;
        }

        .admin-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #0056b3;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 10px;
            margin-top: 0;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.65;
        }

        .btn-primary {
            background-color: #0056b3;
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: #003d82;
        }

        .btn-delete {
            background-color: #dc3545;
            color: white;
            padding: 6px 12px;
            font-size: 14px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .btn-delete:hover:not(:disabled) {
            background-color: #c82333;
        }

        .btn-logout {
            background-color: #f4f4f4;
            color: #333;
            width: 100%;
            margin-top: 40px;
            border: 1px solid #ccc;
        }

        .btn-logout:hover {
            background-color: #e0e0e0;
        }

        #status-msg,
        #news-status-msg,
        #member-status-msg,
        #login-error {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            min-height: 20px;
        }

        .user-info {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            background: #eef5ff;
            padding: 10px;
            border-radius: 5px;
        }

        #admin-section,
        #loading-section {
            display: none;
        }

        hr {
            border: 0;
            border-top: 2px dashed #ddd;
            margin: 40px 0;
        }

        .data-list {
            list-style: none;
            padding: 0;
        }

        .data-list li {
            background: #f9f9f9;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #0056b3;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .data-content {
            max-width: 80%;
            overflow-wrap: anywhere;
        }

        .subtext {
            display: block;
            margin-top: 4px;
            font-size: 12px;
            color: #888;
        }

        .error-item {
            color: #b00020;
            border-left-color: #dc3545 !important;
            display: block !important;
        }

        .empty-item {
            color: #666;
            display: block !important;
        }

        @media (max-width: 600px) {
            body {
                padding: 12px;
            }

            .admin-container {
                padding: 20px;
            }

            .data-list li {
                align-items: flex-start;
            }

            .data-content {
                max-width: calc(100% - 70px);
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">

        <section id="login-section">
            <h2>🔒 系統登入</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="emailInput">管理員帳號（Email）</label>
                    <input type="email" id="emailInput" required placeholder="請輸入 Email" autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="passwordInput">管理員密碼</label>
                    <input type="password" id="passwordInput" required placeholder="請輸入密碼" autocomplete="current-password">
                </div>

                <button type="submit" class="btn-primary">登入系統</button>
            </form>
            <div id="login-error" role="status" style="color: red;"></div>
        </section>

        <section id="loading-section" style="text-align: center; padding: 30px;">
            <h3 style="color: #0056b3;">⏳ 驗證管理員身分與載入資料中...</h3>
        </section>

        <section id="admin-section">
            <div class="user-info">
                目前登入：
                <span id="current-user-email" style="font-weight: bold; color: #0056b3;"></span>
            </div>

            <h2>📝 新增發表著作</h2>
            <form id="add-paper-form">
                <div class="form-group">
                    <label for="yearInput">年份（例如：114）</label>
                    <input type="text" id="yearInput" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="titleInput">論文名稱</label>
                    <input type="text" id="titleInput" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="authorInput">學生／指導教授</label>
                    <input type="text" id="authorInput" required placeholder="例如：王大明, 林俊良" autocomplete="off">
                </div>

                <button type="submit" class="btn-primary">確認新增論文</button>
                <div id="status-msg" role="status"></div>
            </form>

            <hr>

            <h2>📢 發布最新消息</h2>
            <form id="add-news-form">
                <div class="form-group">
                    <label for="newsDate">日期（例如：2026/03/17）</label>
                    <input type="text" id="newsDate" required placeholder="YYYY/MM/DD">
                </div>

                <div class="form-group">
                    <label for="newsContent">消息內容</label>
                    <input type="text" id="newsContent" required placeholder="請輸入消息內容...">
                </div>

                <button type="submit" class="btn-primary">發布消息</button>
                <div id="news-status-msg" role="status"></div>
            </form>

            <hr>

            <h2>🧑‍🎓 新增實驗室成員</h2>
            <form id="add-member-form">
                <div class="form-group">
                    <label for="memberYear">入學年份（例如：114學年度）</label>
                    <input type="text" id="memberYear" required placeholder="例如：114">
                </div>

                <div class="form-group">
                    <label for="memberTitle">學位／職稱</label>
                    <input type="text" id="memberTitle" required placeholder="例如：碩士班">
                </div>

                <div class="form-group">
                    <label for="memberName">姓名</label>
                    <input type="text" id="memberName" required placeholder="例如：陳小明">
                </div>

                <div class="form-group">
                    <label for="memberPhotoUrl">照片路徑（照片放在 GitHub）</label>
                    <input type="text" id="memberPhotoUrl" required placeholder="例如：members/student1.jpg">
                </div>

                <button type="submit" class="btn-primary">新增成員</button>
                <div id="member-status-msg" role="status"></div>
            </form>

            <hr style="border-top: 4px solid #333;">

            <h2>🗄️ 現有資料管理中心</h2>
            <p style="text-align: center; color: #666; margin-bottom: 20px;">
                如果資料有誤，請點擊右側「刪除」後，再重新新增一筆正確的資料。
            </p>

            <h3 style="color: #ff9900;">📍 最新消息列表</h3>
            <ul class="data-list" id="manage-news-list">
                <li class="empty-item">載入中...</li>
            </ul>

            <h3 style="color: #ff9900;">📍 發表著作列表</h3>
            <ul class="data-list" id="manage-paper-list">
                <li class="empty-item">載入中...</li>
            </ul>

            <h3 style="color: #ff9900;">📍 實驗室成員列表</h3>
            <ul class="data-list" id="manage-member-list">
                <li class="empty-item">載入中...</li>
            </ul>

            <button id="logout-btn" class="btn-logout">登出系統</button>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import {
            initializeAppCheck,
            ReCaptchaV3Provider
        } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app-check.js";
        import {
            getFirestore,
            collection,
            addDoc,
            doc,
            getDoc,
            getDocs,
            deleteDoc,
            query,
            orderBy
        } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import {
            getAuth,
            signInWithEmailAndPassword,
            signOut,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDSsNfKu-G2GJkIzd4_zM0wm49UgJ7_xm0",
            authDomain: "nchu606lab.firebaseapp.com",
            projectId: "nchu606lab",
            storageBucket: "nchu606lab.firebasestorage.app",
            messagingSenderId: "174937158180",
            appId: "1:174937158180:web:90ac6670124fe33f191eb1"
        };

        const app = initializeApp(firebaseConfig);

        // Firebase App Check：驗證請求是否來自本網站。
        const appCheck = initializeAppCheck(app, {
            provider: new ReCaptchaV3Provider(
                "6LdHPWEtAAAAAP-zDjVaD7etRrDAaujyQSIOhCBt"
            ),
            isTokenAutoRefreshEnabled: true
        });
        const db = getFirestore(app);
        const auth = getAuth(app);

        const loginSection = document.getElementById("login-section");
        const loadingSection = document.getElementById("loading-section");
        const adminSection = document.getElementById("admin-section");
        const loginError = document.getElementById("login-error");

        function setStatus(elementId, text, color = "") {
            const element = document.getElementById(elementId);
            element.textContent = text;
            element.style.color = color;
        }

        function clearAllStatus() {
            setStatus("status-msg", "");
            setStatus("news-status-msg", "");
            setStatus("member-status-msg", "");
        }

        function setLoadingItem(listElement, text = "載入中...") {
            listElement.replaceChildren();

            const li = document.createElement("li");
            li.className = "empty-item";
            li.textContent = text;
            listElement.appendChild(li);
        }

        function setEmptyItem(listElement, text) {
            listElement.replaceChildren();

            const li = document.createElement("li");
            li.className = "empty-item";
            li.textContent = text;
            listElement.appendChild(li);
        }

        function showListError(listElement, label, error) {
            console.error(`${label}載入失敗：`, error);

            listElement.replaceChildren();

            const li = document.createElement("li");
            li.className = "error-item";

            const code = error?.code ? `（${error.code}）` : "";
            const message = error?.message || "未知錯誤";
            li.textContent = `載入失敗${code}：${message}`;

            listElement.appendChild(li);
        }

        function createDeleteButton(documentId, collectionName) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "btn-delete";
            button.textContent = "刪除";
            button.dataset.id = documentId;
            button.dataset.collection = collectionName;
            return button;
        }

        async function loadNews() {
            const newsList = document.getElementById("manage-news-list");
            setLoadingItem(newsList);

            try {
                const newsQuery = query(
                    collection(db, "news"),
                    orderBy("date", "desc")
                );
                const snapshot = await getDocs(newsQuery);

                newsList.replaceChildren();

                if (snapshot.empty) {
                    setEmptyItem(newsList, "目前沒有最新消息資料。");
                    return;
                }

                snapshot.forEach((documentSnapshot) => {
                    const data = documentSnapshot.data();

                    const li = document.createElement("li");
                    const content = document.createElement("div");
                    content.className = "data-content";

                    const date = document.createElement("strong");
                    date.textContent = String(data.date ?? "");

                    content.appendChild(date);
                    content.appendChild(
                        document.createTextNode(
                            ` - ${String(data.content ?? "")}`
                        )
                    );

                    li.append(
                        content,
                        createDeleteButton(documentSnapshot.id, "news")
                    );
                    newsList.appendChild(li);
                });
            } catch (error) {
                showListError(newsList, "最新消息", error);
            }
        }

        async function loadPapers() {
            const paperList = document.getElementById("manage-paper-list");
            setLoadingItem(paperList);

            try {
                const snapshot = await getDocs(collection(db, "publications"));

                paperList.replaceChildren();

                if (snapshot.empty) {
                    setEmptyItem(paperList, "目前沒有發表著作資料。");
                    return;
                }

                snapshot.forEach((documentSnapshot) => {
                    const data = documentSnapshot.data();

                    const li = document.createElement("li");
                    const content = document.createElement("div");
                    content.className = "data-content";
                    content.textContent =
                        `[${String(data.year ?? "")}] ` +
                        `${String(data.title ?? "")} ` +
                        `(${String(data.author ?? "")})`;

                    li.append(
                        content,
                        createDeleteButton(
                            documentSnapshot.id,
                            "publications"
                        )
                    );
                    paperList.appendChild(li);
                });
            } catch (error) {
                showListError(paperList, "發表著作", error);
            }
        }

        async function loadMembers() {
            const memberList = document.getElementById("manage-member-list");
            setLoadingItem(memberList);

            try {
                const snapshot = await getDocs(collection(db, "members"));

                memberList.replaceChildren();

                if (snapshot.empty) {
                    setEmptyItem(memberList, "目前沒有實驗室成員資料。");
                    return;
                }

                snapshot.forEach((documentSnapshot) => {
                    const data = documentSnapshot.data();

                    const li = document.createElement("li");
                    const content = document.createElement("div");
                    content.className = "data-content";

                    const firstLine = document.createElement("div");
                    firstLine.textContent =
                        `[${String(data.year ?? "")}學年度] ` +
                        `${String(data.title ?? "")} - ` +
                        `${String(data.name ?? "")}`;

                    const photoPath = document.createElement("span");
                    photoPath.className = "subtext";
                    photoPath.textContent =
                        `路徑：${String(data.photoUrl ?? "")}`;

                    content.append(firstLine, photoPath);

                    li.append(
                        content,
                        createDeleteButton(documentSnapshot.id, "members")
                    );
                    memberList.appendChild(li);
                });
            } catch (error) {
                showListError(memberList, "實驗室成員", error);
            }
        }

        async function loadAllManagementData() {
            await Promise.all([
                loadNews(),
                loadPapers(),
                loadMembers()
            ]);
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                loginSection.style.display = "block";
                loadingSection.style.display = "none";
                adminSection.style.display = "none";
                return;
            }

            loginSection.style.display = "none";
            loadingSection.style.display = "block";
            adminSection.style.display = "none";

            try {
                // 即使 adminCheck 文件不存在，授權成功的 getDoc 仍會完成。
                await getDoc(doc(db, "system", "adminCheck"));

                document.getElementById("current-user-email").textContent =
                    user.email ?? "";

                loadingSection.style.display = "none";
                adminSection.style.display = "block";
                loginError.textContent = "";

                await loadAllManagementData();
            } catch (error) {
                console.error("管理員權限驗證失敗：", error);

                loginSection.style.display = "block";
                loadingSection.style.display = "none";
                adminSection.style.display = "none";
                loginError.textContent =
                    `❌ 帳號權限不足：${error.code || error.message}`;

                await signOut(auth);
            }
        });

        document.getElementById("login-form").addEventListener(
            "submit",
            async (event) => {
                event.preventDefault();

                const email = document.getElementById("emailInput").value.trim();
                const password = document.getElementById("passwordInput").value;

                loginError.textContent = "⏳ 登入驗證中...";

                try {
                    await signInWithEmailAndPassword(auth, email, password);
                    loginError.textContent = "";
                } catch (error) {
                    console.error("登入失敗：", error);
                    loginError.textContent =
                        `❌ 登入失敗：${error.code || "帳號或密碼錯誤"}`;
                }
            }
        );

        document.getElementById("logout-btn").addEventListener(
            "click",
            async () => {
                await signOut(auth);
                window.location.href = "index.html";
            }
        );

        document.getElementById("add-paper-form").addEventListener(
            "submit",
            async (event) => {
                event.preventDefault();
                clearAllStatus();

                setStatus("status-msg", "⏳ 寫入雲端中...", "#ff9900");

                try {
                    await addDoc(collection(db, "publications"), {
                        year: document.getElementById("yearInput").value.trim(),
                        title: document.getElementById("titleInput").value.trim(),
                        author: document.getElementById("authorInput").value.trim(),
                        createdAt: new Date()
                    });

                    setStatus("status-msg", "✅ 論文新增成功！", "green");
                    event.currentTarget.reset();
                    await loadPapers();
                } catch (error) {
                    console.error("論文新增失敗：", error);
                    setStatus(
                        "status-msg",
                        `❌ 寫入失敗：${error.code || error.message}`,
                        "red"
                    );
                }
            }
        );

        document.getElementById("add-news-form").addEventListener(
            "submit",
            async (event) => {
                event.preventDefault();
                clearAllStatus();

                setStatus("news-status-msg", "⏳ 發布中...", "#ff9900");

                try {
                    await addDoc(collection(db, "news"), {
                        date: document.getElementById("newsDate").value.trim(),
                        content: document.getElementById("newsContent").value.trim(),
                        createdAt: new Date()
                    });

                    setStatus(
                        "news-status-msg",
                        "✅ 消息發布成功！",
                        "green"
                    );
                    event.currentTarget.reset();
                    await loadNews();
                } catch (error) {
                    console.error("消息發布失敗：", error);
                    setStatus(
                        "news-status-msg",
                        `❌ 發布失敗：${error.code || error.message}`,
                        "red"
                    );
                }
            }
        );

        document.getElementById("add-member-form").addEventListener(
            "submit",
            async (event) => {
                event.preventDefault();
                clearAllStatus();

                setStatus("member-status-msg", "⏳ 寫入中...", "#ff9900");

                try {
                    await addDoc(collection(db, "members"), {
                        year: document.getElementById("memberYear").value.trim(),
                        title: document.getElementById("memberTitle").value.trim(),
                        name: document.getElementById("memberName").value.trim(),
                        photoUrl:
                            document.getElementById("memberPhotoUrl").value.trim(),
                        createdAt: new Date()
                    });

                    setStatus(
                        "member-status-msg",
                        "✅ 成員新增成功！",
                        "green"
                    );
                    event.currentTarget.reset();
                    await loadMembers();
                } catch (error) {
                    console.error("成員新增失敗：", error);
                    setStatus(
                        "member-status-msg",
                        `❌ 新增失敗：${error.code || error.message}`,
                        "red"
                    );
                }
            }
        );

        document
            .querySelector(".admin-container")
            .addEventListener("click", async (event) => {
                const button = event.target.closest(".btn-delete");
                if (!button) {
                    return;
                }

                const documentId = button.dataset.id;
                const collectionName = button.dataset.collection;

                if (!documentId || !collectionName) {
                    alert("❌ 刪除資訊不完整，請重新整理頁面。");
                    return;
                }

                const confirmed = window.confirm(
                    "⚠️ 確定要永久刪除這筆資料嗎？刪除後無法復原。"
                );

                if (!confirmed) {
                    return;
                }

                button.disabled = true;
                button.textContent = "刪除中...";

                try {
                    await deleteDoc(
                        doc(db, collectionName, documentId)
                    );

                    alert("✅ 已成功刪除！");

                    if (collectionName === "news") {
                        await loadNews();
                    } else if (collectionName === "publications") {
                        await loadPapers();
                    } else if (collectionName === "members") {
                        await loadMembers();
                    }
                } catch (error) {
                    console.error("刪除失敗：", error);
                    alert(
                        `❌ 刪除失敗：${error.code || error.message}`
                    );
                    button.disabled = false;
                    button.textContent = "刪除";
                }
            });
    </script>
</body>
</html>
